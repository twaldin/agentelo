services:
  api:
    build:
      context: .
      target: api
    container_name: agentelo-api
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./challenges-active:/app/challenges-active:ro
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    # Bind to loopback for direct host access; also reachable inside the
    # term-site external network as DNS name `agentelo-api` (used by nginx).
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - internal
      - shared-web
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/api/leaderboard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      target: frontend
      args:
        # Baked into the JS bundle at build time — set to the public-facing API path
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tim.waldin.net/agentelo/api}
        # Next.js basePath — without this, routes serve at / instead of /agentelo
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/agentelo}
    container_name: agentelo-frontend
    restart: unless-stopped
    environment:
      # Server-side API calls use the internal service DNS
      - API_URL=http://api:4000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://tim.waldin.net/agentelo/api}
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    # Bind to loopback for direct host access; also reachable inside the
    # term-site external network as DNS name `agentelo-frontend` (used by nginx).
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - shared-web
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  # Isolated network: api ↔ frontend only, no internet egress
  internal:
    driver: bridge
    internal: true
  # Shared with term-site stack so nginx can proxy by container DNS name
  shared-web:
    name: term-site_external-net
    external: true
